name: itunes_app
description: "Reproductor de música minimalista con diseño glassmorphism"
publish_to: 'none'
version: 1.0.16+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.36
  permission_handler: ^11.0.0
  path_provider: ^2.0.0
  path: ^1.8.0
  share_plus: ^10.0.0
  image_picker: ^1.1.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
